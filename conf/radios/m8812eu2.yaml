# conf/radios/m8812eu2.yaml
#
# Source for published values: BL-M8812EU2 datasheet V1.0.1.0
# (2023-11-13), §4 WLAN RF Specification. Chipset: Realtek
# RTL8812EU.
#
# The datasheet publishes sensitivity at MCS 0 and MCS 7 only.
# MCS 1-6 values in this file are linear-in-dBm interpolation
# between those endpoints (2.71 dB per step, rounded to int).
# Field-validate every row per airframe before operational use
# — antenna gains, front-end losses, and operator country of
# operation all shift the numbers from the chip-level sheet.
#
# Calibrated TX power from datasheet: HT20 MCS7 = 23 dBm;
# HT40 MCS7 = 22.5 dBm. Going above the calibrated TX power
# voids EVM specs.

name: BL-M8812EU2
chipset: RTL8812EU

mcs_min: 0
mcs_max: 5

bandwidth_supported: [20, 40]
bandwidth_default:   20

tx_power_min_dBm: 0
tx_power_max_dBm: 30

sensitivity_dBm:
  20:
    0: -96
    1: -93
    2: -91
    3: -88
    4: -85
    5: -83
    6: -80
    7: -77
  40:
    0: -93
    1: -90
    2: -88
    3: -85
    4: -82
    5: -80
    6: -77
    7: -74

data_rate_Mbps_LGI:
  20:
    0:   6.5
    1:  13.0
    2:  19.5
    3:  26.0
    4:  39.0
    5:  52.0
    6:  58.5
    7:  65.0
  40:
    0:  13.5
    1:  27.0
    2:  40.5
    3:  54.0
    4:  81.0
    5: 108.0
    6: 121.5
    7: 135.0

# Per-MCS minimum SNR (dB) the receiver needs to decode that MCS at
# acceptable PER (~5%). Constellation + coding-rate driven, with
# chipset implementation loss baked in. HT40 adds ~3 dB across the
# board (wider channel = higher noise bandwidth).
#
# These are 802.11n field-typical starting values, NOT chipset-spec
# numbers (RTL8812EU datasheet does not publish SNR thresholds).
# Field-validate per airframe by walking out the link and observing
# the SNR at which each MCS begins dropping packets.
snr_floor_dB:
  20:
    0:  5     # BPSK 1/2
    1:  8     # QPSK 1/2
    2: 11     # QPSK 3/4
    3: 14     # 16-QAM 1/2
    4: 17     # 16-QAM 3/4
    5: 20     # 64-QAM 2/3
    6: 23     # 64-QAM 3/4
    7: 25     # 64-QAM 5/6
  40:
    0:  8
    1: 11
    2: 14
    3: 17
    4: 20
    5: 23
    6: 26
    7: 28

# Per-MCS FEC `(k, n)`. Pinned per-row, never escalated reactively
# — `docs/knob-cadence-bench.md` showed FEC `CMD_SET_FEC` reconfigs
# are the most expensive controller knob. Bitrate is computed at
# runtime as `phy_data_rate × policy.bitrate.utilization_factor ×
# (k/n)`; see `gs/dynamic_link/bitrate.py`.
#
# Design choices for this profile:
# - MCS 0/1/2 share `(k=2, n=5)` so MCS bouncing in the survival band
#   never triggers a `CMD_SET_FEC`.
# - MCS 3-7 ramp `k` gradually (4 → 6 → 8 → 10 → 12) — each step
#   doubles block size while PHY also climbs, so block-fill latency
#   stays in the 5-6 ms band at every row.
# - Redundancy decreases monotonically with MCS (60% → 17%): cleaner
#   link needs less parity.
fec_table:
  20:
    0: {k: 2,  n: 5}                        # goodput 2.6,  block-fill 14.9 ms
    1: {k: 2,  n: 5}                        # goodput 5.2,  block-fill  9.0 ms
    2: {k: 2,  n: 5}                        # goodput 7.8,  block-fill  5.6 ms
    3: {k: 4,  n: 7}                        # goodput 14.9, block-fill  6.0 ms
    4: {k: 6,  n: 9}                        # goodput 26.0, block-fill  5.2 ms
    5: {k: 8,  n: 10}                       # goodput 41.6, block-fill  5.0 ms
    6: {k: 10, n: 12}                       # goodput 48.8, block-fill  5.1 ms
    7: {k: 12, n: 14}                       # goodput 55.7, block-fill  5.4 ms
  40:
    # 40 MHz roughly doubles PHY at every MCS; (k, n) carry over
    # since the redundancy logic is MCS-driven not bandwidth-driven.
    0: {k: 2,  n: 5}
    1: {k: 2,  n: 5}
    2: {k: 2,  n: 5}
    3: {k: 4,  n: 7}
    4: {k: 6,  n: 9}
    5: {k: 8,  n: 10}
    6: {k: 10, n: 12}
    7: {k: 12, n: 14}

# conf/radios/m8812eu2.yaml
#
# Source for published values: BL-M8812EU2 datasheet V1.0.1.0
# (2023-11-13), §4 WLAN RF Specification. Chipset: Realtek
# RTL8812EU.
#
# The datasheet publishes sensitivity at MCS 0 and MCS 7 only.
# MCS 1-6 values in this file are linear-in-dBm interpolation
# between those endpoints (2.71 dB per step, rounded to int).
# Field-validate every row per airframe before operational use
# — antenna gains, front-end losses, and operator country of
# operation all shift the numbers from the chip-level sheet.
#
# Calibrated TX power from datasheet: HT20 MCS7 = 23 dBm;
# HT40 MCS7 = 22.5 dBm. Going above the calibrated TX power
# voids EVM specs.

name: BL-M8812EU2
chipset: RTL8812EU

mcs_min: 0
mcs_max: 5

bandwidth_supported: [20, 40]
bandwidth_default:   20

tx_power_min_dBm: 0
tx_power_max_dBm: 30

# RSSI sensitivity (sensitivity_dBm) used to live here; never fed the
# MCS selector and was dropped — selection runs on snr_floor_dB below.

data_rate_Mbps_LGI:
  20:
    0:   6.5
    1:  13.0
    2:  19.5
    3:  26.0
    4:  39.0
    5:  52.0
    6:  58.5
    7:  65.0
  40:
    0:  13.5
    1:  27.0
    2:  40.5
    3:  54.0
    4:  81.0
    5: 108.0
    6: 121.5
    7: 135.0

# Per-MCS minimum SNR (dB) the receiver needs to decode that MCS at
# acceptable PER (~5%). Constellation + coding-rate driven, with
# chipset implementation loss baked in. HT40 adds ~3 dB across the
# board (wider channel = higher noise bandwidth).
#
# These are 802.11n field-typical starting values, NOT chipset-spec
# numbers (RTL8812EU datasheet does not publish SNR thresholds).
# Field-validate per airframe by walking out the link and observing
# the SNR at which each MCS begins dropping packets.
snr_floor_dB:
  20:
    0:  5     # BPSK 1/2
    1:  8     # QPSK 1/2
    2: 11     # QPSK 3/4
    3: 14     # 16-QAM 1/2
    4: 17     # 16-QAM 3/4
    5: 20     # 64-QAM 2/3
    6: 23     # 64-QAM 3/4
    7: 25     # 64-QAM 5/6
  40:
    0:  8
    1: 11
    2: 14
    3: 17
    4: 20
    5: 23
    6: 26
    7: 28

# (k, n) are computed at runtime — see gs/dynamic_link/dynamic_fec.py.
# This profile used to carry a per-MCS fec_table here; P4b removed it.
